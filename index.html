<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANUPLOAD - antsb System</title>
    <style>
        :root {
            --primary: #00ff66;
            --bg: #121212;
            --surface: #1e1e1e;
            --text: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: var(--surface);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            border: 1px solid #333;
        }
        h2 { text-align: center; color: var(--primary); margin-top: 0; }
        .hidden { display: none !important; }
        input[type="password"], input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #444;
            background: #2a2a2a;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; }
        .menu-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            background: #333;
            color: #fff;
            flex: 1;
        }
        .tab-btn.active {
            background: var(--primary);
            color: #000;
        }
        .file-item {
            background: #2a2a2a;
            padding: 15px;
            margin-top: 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary);
        }
        .file-info {word-break: break-all; margin-right: 10px;}
        .actions button {
            width: auto;
            padding: 5px 10px;
            margin-left: 5px;
            font-size: 12px;
        }
        .btn-del { background: #ff3333; color: white; }
        .btn-down { background: #3399ff; color: white; }
        #status { text-align: center; color: #aaa; margin-top: 10px; font-size: 14px;}
    </style>
</head>
<body>

<div class="container">
    <h2>ANUPLOAD</h2>
    
    <div id="login-box">
        <label>Mật khẩu hệ thống:</label>
        <input type="password" id="password-input" placeholder="Nhập mật khẩu xác minh (0904)...">
        <button onclick="checkPassword()">XÁC MINH HỆ THỐNG</button>
    </div>

    <div id="main-box" class="hidden">
        <div class="menu-tabs">
            <button class="tab-btn active" onclick="switchTab('upload')">UPLOAD</button>
            <button class="tab-btn" onclick="switchTab('list')" id="btn-tab-list">DANH SÁCH FILE</button>
        </div>

        <div id="tab-upload">
            <label><b>Chọn File / Ảnh / Video:</b></label>
            <input type="file" id="file-input" style="margin: 10px 0; color: #fff;">
            
            <label><b>Hoặc Nhập Tin Nhắn / Ghi chú:</b></label>
            <textarea id="msg-input" rows="4" placeholder="Nhập tin nhắn quay video từ net về máy..."></textarea>
            
            <button onclick="handleUpload()" id="upload-btn">LƯU LÊN HỆ THỐNG</button>
        </div>

        <div id="tab-list" class="hidden">
            <div id="file-list-container">Đang tải danh sách từ kho lưu trữ...</div>
        </div>

        <div id="status"></div>
    </div>
</div>

<script src="data.js"></script>
</body>
</html>
